arxiv:
  base_url: http://export.arxiv.org/api/query
  categories: []
  years_back: 2
  batch_size: 100
  max_results_per_query: 0
  pause_seconds: 4.0
  parallel_queries: 1
  sort_by: submittedDate
  sort_order: descending
  queries:
    - id: example-core
      text: '(all:"your domain phrase" OR all:"another key phrase")'
      start_date: 2023-01-01
    - id: example-method
      text: '(all:"your method family" OR all:"another method family")'
      start_date: 2023-01-01
